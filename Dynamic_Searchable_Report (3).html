
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic ICMS Report Search (Printable & Selectable)</title>
    <!-- Include SheetJS to parse Excel files in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; word-wrap: break-word; }
        th { background-color: #f2f2f2; position: sticky; top: 0; z-index: 10; }
        .controls { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; align-items: flex-end; }
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        input[type="text"], select, input[type="file"] { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button.print-btn { padding: 10px 15px; font-size: 14px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button.print-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        button.print-btn:hover:not(:disabled) { background-color: #0056b3; }
        .remark-col { width: 40%; }
        .header-title { margin-top: 0; }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-weight: bold; color: #555; }
        mark { background-color: yellow; color: black; padding: 0 2px; border-radius: 2px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">Dynamic ICMS Asset Failures - Search, Filter & Print</h2>
        <p>Please upload the original dataset (e.g., <b>ICMS_REPORT_363.xlsx</b>) to populate the table with all details including Failure IDs.</p>
        
        <div class="controls">
            <div class="control-group" style="min-width: 200px;">
                <label for="fileUpload"><b>1. Upload Excel/CSV File:</b></label>
                <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv" />
            </div>
            <div class="control-group" style="min-width: 200px;">
                <label for="searchBar"><b>2. Search Remarks:</b></label>
                <input type="text" id="searchBar" placeholder="Type keywords..." onkeyup="applyFilters()" disabled />
            </div>
            <div class="control-group">
                <label for="zoneFilter"><b>3. Filter by Zone:</b></label>
                <select id="zoneFilter" onchange="applyFilters()" disabled>
                    <option value="All">All</option>
                </select>
            </div>
            <div class="control-group">
                <label for="divFilter"><b>4. Filter by Division:</b></label>
                <select id="divFilter" onchange="applyFilters()" disabled>
                    <option value="All">All</option>
                </select>
            </div>
            <div class="control-group">
                <label for="classFilter"><b>5. Filter by Classification:</b></label>
                <select id="classFilter" onchange="applyFilters()" disabled>
                    <option value="All">All</option>
                </select>
            </div>
        </div>

        <div class="stats-bar">
            <span id="recordCount">Records found: 0</span>
            <button id="printBtn" class="print-btn" onclick="printSelectedRecord()" disabled>🖨️ Print Selected Record</button>
        </div>
        
        <table id="reportTable">
            <thead>
                <tr>
                    <th style="width: 5%; text-align: center;">Select</th>
                    <th style="width: 10%;">Failure ID</th>
                    <th style="width: 7%;">Zone</th>
                    <th style="width: 12%;">Classification</th>
                    <th style="width: 6%;">Div.</th>
                    <th style="width: 15%;">Date Time</th>
                    <th class="remark-col">Remarks</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align: center;">Waiting for file upload...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let globalData = [];

        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align: center;">Processing file... Please wait.</td></tr>';

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // --- FIX: Dynamically find the correct header row ---
                    // Original ICMS reports have about 32 rows of metadata at the top.
                    // We need to tell the parser where the actual column names begin.
                    const rawDataArr = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                    let headerIdx = 0;
                    for (let i = 0; i < Math.min(rawDataArr.length, 100); i++) {
                        const row = rawDataArr[i];
                        // If the row contains "Zone" and "Remarks", it's our header row!
                        if (row && (row.includes('Zone') || row.indexOf('Zone') !== -1) && (row.includes('Remarks') || row.indexOf('Remarks') !== -1)) {
                            headerIdx = i;
                            break;
                        }
                    }

                    // Convert sheet to JSON starting from the identified header row
                    const rawData = XLSX.utils.sheet_to_json(worksheet, {range: headerIdx, defval: ""});
                    // ---------------------------------------------------
                    
                    // Clean up and attach unique ID
                    globalData = [];
                    let uidCounter = 0;
                    rawData.forEach(row => {
                        // Skip empty rows or rows that clearly look like metadata/footers
                        if (row['Zone'] && typeof row['Zone'] === 'string' && row['Zone'].trim() !== "" && row['Remarks']) {
                            row._uid = uidCounter++;
                            globalData.push(row);
                        }
                    });

                    if (globalData.length === 0) {
                        document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">No valid data rows found. Please check the Excel file.</td></tr>';
                        return;
                    }
                    
                    // Enable inputs
                    document.getElementById('searchBar').disabled = false;
                    document.getElementById('zoneFilter').disabled = false;
                    document.getElementById('divFilter').disabled = false;
                    document.getElementById('classFilter').disabled = false;
                    document.getElementById('printBtn').disabled = false;

                    populateDropdowns();
                    applyFilters();
                } catch (error) {
                    console.error(error);
                    alert("Error processing file. Please ensure it is a valid Excel or CSV file.");
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Error processing file.</td></tr>';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function populateDropdowns() {
            const zones = new Set();
            const divisions = new Set();
            const classifications = new Set();

            globalData.forEach(row => {
                if (row['Zone']) zones.add(row['Zone'].toString().trim());
                if (row['Div.']) divisions.add(row['Div.'].toString().trim());
                if (row['Classification']) classifications.add(row['Classification'].toString().trim());
            });

            const zoneFilter = document.getElementById('zoneFilter');
            const divFilter = document.getElementById('divFilter');
            const classFilter = document.getElementById('classFilter');

            zoneFilter.innerHTML = '<option value="All">All</option>';
            divFilter.innerHTML = '<option value="All">All</option>';
            classFilter.innerHTML = '<option value="All">All</option>';

            Array.from(zones).filter(Boolean).sort().forEach(zone => {
                zoneFilter.innerHTML += `<option value="${zone}">${zone}</option>`;
            });
            Array.from(divisions).filter(Boolean).sort().forEach(div => {
                divFilter.innerHTML += `<option value="${div}">${div}</option>`;
            });
            Array.from(classifications).filter(Boolean).sort().forEach(cls => {
                classFilter.innerHTML += `<option value="${cls}">${cls}</option>`;
            });
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchBar').value.trim();
            const searchText = searchInput.toLowerCase();
            const zoneFilter = document.getElementById('zoneFilter').value;
            const divFilter = document.getElementById('divFilter').value;
            const classFilter = document.getElementById('classFilter').value;

            const filteredData = globalData.filter(row => {
                const remarks = (row['Remarks'] || "").toString().toLowerCase();
                const zone = (row['Zone'] || "").toString().trim();
                const div = (row['Div.'] || "").toString().trim();
                const cls = (row['Classification'] || "").toString().trim();

                const matchSearch = searchText === "" || remarks.includes(searchText);
                const matchZone = zoneFilter === "All" || zone === zoneFilter;
                const matchDiv = divFilter === "All" || div === divFilter;
                const matchClass = classFilter === "All" || cls === classFilter;

                return matchSearch && matchZone && matchDiv && matchClass;
            });

            renderTable(filteredData, searchInput);
        }

        function renderTable(data, searchInput) {
            const tbody = document.getElementById('tableBody');
            const recordCount = document.getElementById('recordCount');
            
            tbody.innerHTML = "";
            recordCount.textContent = `Records found: ${data.length}`;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No matching records found.</td></tr>';
                return;
            }

            const fragment = document.createDocumentFragment();

            data.forEach(row => {
                const tr = document.createElement('tr');
                
                let remarksHtml = (row['Remarks'] || "").toString();
                
                // Highlight logic
                if (searchInput) {
                    const escapedSearchText = searchInput.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${escapedSearchText})`, "gi");
                    remarksHtml = remarksHtml.replace(regex, '<mark>$1</mark>');
                }

                tr.innerHTML = `
                    <td style="text-align: center; vertical-align: middle;">
                        <input type="radio" name="recordSelect" value="${row._uid}" style="transform: scale(1.5); cursor: pointer;" />
                    </td>
                    <td><b>${row['Failure ID'] || "N/A"}</b></td>
                    <td>${row['Zone'] || ""}</td>
                    <td>${row['Classification'] || ""}</td>
                    <td>${row['Div.'] || ""}</td>
                    <td>${row['Start Date Time'] || ""}</td>
                    <td>${remarksHtml}</td>
                `;
                
                fragment.appendChild(tr);
            });
            
            tbody.appendChild(fragment);
        }

        function printSelectedRecord() {
            const selectedRadio = document.querySelector('input[name="recordSelect"]:checked');
            if (!selectedRadio) {
                alert("Please select a record using the radio buttons in the left column before printing.");
                return;
            }

            const uid = parseInt(selectedRadio.value);
            const record = globalData.find(r => r._uid === uid);
            
            if (!record) {
                alert("Could not find the selected record.");
                return;
            }

            // Prepare Print Layout
            let printContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Print Record - ID: ${record['Failure ID'] || 'N/A'}</title>
                    <style>
                        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; color: #333; }
                        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px; }
                        h1 { margin: 0; font-size: 24px; text-transform: uppercase; }
                        h2 { margin: 5px 0 0 0; font-size: 18px; color: #555; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
                        th, td { border: 1px solid #aaa; padding: 12px; text-align: left; vertical-align: top; font-size: 14px; }
                        th { background-color: #f4f4f4; width: 30%; font-weight: bold; }
                        .remarks-cell { white-space: pre-wrap; font-style: italic; background-color: #fdfdfd; }
                        .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #777; border-top: 1px solid #ddd; padding-top: 10px; }
                        @media print {
                            body { padding: 0; }
                            table { box-shadow: none; border: 1px solid #000; }
                            th, td { border: 1px solid #000; }
                            .no-print { display: none; }
                        }
                    </style>
                </head>
                <body>
                    <div class="no-print" style="margin-bottom: 20px;">
                        <button onclick="window.print()" style="padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Print Now</button>
                        <button onclick="window.close()" style="padding: 10px 20px; font-size: 16px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Close</button>
                    </div>

                    <div class="header">
                        <h1>ICMS Asset Failure Report</h1>
                        <h2>Failure ID: ${record['Failure ID'] || 'Not Assigned'}</h2>
                    </div>
                    
                    <table>
                        <tr>
                            <th>Zone</th>
                            <td>${record['Zone'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Division</th>
                            <td>${record['Div.'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Classification</th>
                            <td>${record['Classification'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Main Head</th>
                            <td>${record['Main Head'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Sub Head</th>
                            <td>${record['Sub Head'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Failure Location</th>
                            <td>${record['Failure Loc.'] || '-'} (Block Section: ${record['Block Section'] || '-'}, Section: ${record['Section'] || '-'})</td>
                        </tr>
                        <tr>
                            <th>Start Date Time</th>
                            <td>${record['Start Date Time'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>End Date Time</th>
                            <td>${record['End Date Time'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Duration (Mins)</th>
                            <td>${record['Duration'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Affected Train (P/G)</th>
                            <td>${record['Affected Train-P'] || '-'} / ${record['Affected Train-G'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Loco Details</th>
                            <td>${record['Loco'] || '-'} (${record['Loco Type'] || '-'}, Rly: ${record['Loco Rly'] || '-'}, Shed: ${record['Loco Shed'] || '-'})</td>
                        </tr>
                        <tr>
                            <th>Asset Details</th>
                            <td>ID: ${record['Asset ID'] || '-'} | Name: ${record['Asset Name'] || '-'}</td>
                        </tr>
                        <tr>
                            <th>Remarks</th>
                            <td class="remarks-cell">${record['Remarks'] || 'No remarks provided.'}</td>
                        </tr>
                    </table>

                    <div class="footer">
                        Generated from ICMS Report System &bull; Print Date: ${new Date().toLocaleString()}
                    </div>
                </body>
                </html>
            `;

            // Open new window and trigger print
            const printWindow = window.open('', '_blank', 'width=800,height=900');
            printWindow.document.write(printContent);
            printWindow.document.close();
            
            // Automatically trigger print dialog when loaded
            printWindow.onload = function() {
                printWindow.focus();
            };
        }
    </script>
</body>
</html>
